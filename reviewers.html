<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviewer Database — India Indie Music Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: #2a2a38;
      --accent: #7c3aed;
      --accent2: #10b981;
      --accent3: #f59e0b;
      --accent4: #3b82f6;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --tag-bg: #1e1e2e;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { font-weight: 800; font-size: 15px; letter-spacing: -0.3px; }
    .logo a { color: var(--text); text-decoration: none; }
    .logo a:hover { color: var(--accent); }

    .header-right { display: flex; gap: 12px; align-items: center; }
    .total-badge {
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .page-title {
      padding: 32px 32px 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .page-sub {
      padding: 8px 32px 24px;
      font-size: 14px;
      color: var(--muted);
    }

    /* ── FILTERS ── */
    .filters {
      padding: 0 32px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }

    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: white; }
    .pill.active-green { background: var(--accent2); border-color: var(--accent2); color: white; }
    .pill.active-amber { background: var(--accent3); border-color: var(--accent3); color: #000; }
    .pill.active-blue { background: var(--accent4); border-color: var(--accent4); color: white; }

    .search-input {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      width: 260px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* ── STATS BAR ── */
    .stats-bar {
      padding: 0 32px 20px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
    }
    .stat-chip .num { font-weight: 700; font-size: 18px; }
    .stat-chip .lbl { color: var(--muted); font-size: 12px; line-height: 1.2; }

    /* ── GRID ── */
    .grid {
      padding: 0 32px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #3a3a50; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }
    .card-name a { color: var(--text); text-decoration: none; }
    .card-name a:hover { color: var(--accent); }

    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-editorial { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .badge-podcast { background: rgba(16,185,129,0.2); color: #34d399; }
    .badge-submithub-blog { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .badge-submithub-spotify { background: rgba(29,185,84,0.2); color: #1db954; }
    .badge-submithub-youtube { background: rgba(255,0,0,0.2); color: #f87171; }
    .badge-submithub-radio { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .badge-south-asian { background: rgba(249,115,22,0.2); color: #fb923c; }
    .badge-free { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-paid { background: rgba(245,158,11,0.15); color: #fbbf24; }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-tag {
      padding: 3px 8px;
      background: var(--tag-bg);
      border-radius: 4px;
      font-size: 11px;
    }

    .card-submit {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .submit-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .submit-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
      cursor: pointer;
      border: none;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn-email { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .submit-btn-web { background: rgba(16,185,129,0.2); color: #34d399; }
    .submit-btn-submithub { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .submit-btn-paid {
      background: rgba(245,158,11,0.15);
      color: #fbbf24;
    }

    .cost-pill {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent3);
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 100px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── GENRE TAGS (truncated) ── */
    .genres {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .genre-tag {
      font-size: 10px;
      padding: 2px 6px;
      background: var(--surface2);
      border-radius: 3px;
      color: var(--muted);
    }

    /* ── REACH STAT ── */
    .reach {
      font-size: 12px;
      color: var(--muted);
    }
    .reach strong { color: var(--text); }

    @media (max-width: 600px) {
      header, .filters, .stats-bar, .grid { padding-left: 16px; padding-right: 16px; }
      .page-title { padding-left: 16px; }
      .page-sub { padding-left: 16px; }
      .grid { grid-template-columns: 1fr; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <a href="index.html">◉ India Indie Music Radar</a>
    <span style="color:var(--muted); margin-left:8px; font-weight:400;">/ Reviewer Database</span>
  </div>
  <div class="header-right">
    <span class="total-badge" id="visible-count">Loading...</span>
  </div>
</header>

<h1 class="page-title">Reviewer Database</h1>
<p class="page-sub">930+ curators, blogs, podcasts, and playlist editors who cover Indian indie music — with submission contacts and pricing.</p>

<div class="filters">
  <div class="filter-group">
    <div class="filter-label">Search</div>
    <input class="search-input" id="search" type="text" placeholder="Name, genre, language…" />
  </div>

  <div class="filter-group">
    <div class="filter-label">Category</div>
    <div class="pill-row" id="filter-cat">
      <button class="pill active" data-val="all">All</button>
      <button class="pill" data-val="editorial">Editorial &amp; Blogs</button>
      <button class="pill" data-val="podcast">Podcasts</button>
      <button class="pill" data-val="submithub-blog">SubmitHub Blog</button>
      <button class="pill" data-val="submithub-spotify">Spotify Curators</button>
      <button class="pill" data-val="submithub-youtube">YT Channels</button>
      <button class="pill" data-val="submithub-radio">Radio</button>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-label">Submission</div>
    <div class="pill-row" id="filter-cost">
      <button class="pill active" data-val="all">All</button>
      <button class="pill" data-val="free">Free</button>
      <button class="pill" data-val="paid">Paid (SubmitHub)</button>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-label">South Asian</div>
    <div class="pill-row" id="filter-sa">
      <button class="pill active" data-val="all">All</button>
      <button class="pill" data-val="yes">South Asian tagged</button>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-label">Max SubmitHub cost</div>
    <div class="pill-row" id="filter-price">
      <button class="pill active" data-val="all">Any</button>
      <button class="pill" data-val="0">Free tier</button>
      <button class="pill" data-val="1">≤1 credit</button>
      <button class="pill" data-val="2">≤2 credits</button>
      <button class="pill" data-val="3">≤3 credits</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="grid" id="grid">
  <div class="loading">Loading reviewer database…</div>
</div>

<script>
(async () => {
  const res = await fetch('data/reviewers.json');
  const data = await res.json();
  let all = data.reviewers;

  // State
  let catFilter = 'all';
  let costFilter = 'all';
  let saFilter = 'all';
  let priceFilter = 'all';
  let searchVal = '';

  // Helpers
  function cardCat(r) {
    if (r.category === 'editorial') return 'editorial';
    if (r.category === 'podcast') return 'podcast';
    if (r.category === 'submithub') {
      const t = (r.submithub_type || '').toLowerCase();
      if (t.includes('spotify')) return 'submithub-spotify';
      if (t.includes('youtube')) return 'submithub-youtube';
      if (t.includes('radio')) return 'submithub-radio';
      return 'submithub-blog';
    }
    return r.category;
  }

  function isFree(r) {
    if (r.category !== 'submithub') return true;
    return (r.price_credits || 0) === 0;
  }

  function matchesSearch(r, q) {
    if (!q) return true;
    const text = [
      r.name, r.description,
      (r.languages || []).join(' '),
      (r.genres || []).join(' '),
      r.country || '',
      (r.genre_slugs || []).join(' '),
    ].join(' ').toLowerCase();
    return q.toLowerCase().split(' ').every(word => text.includes(word));
  }

  function applyFilters() {
    return all.filter(r => {
      const cc = cardCat(r);
      if (catFilter !== 'all' && cc !== catFilter) return false;
      if (costFilter === 'free' && !isFree(r)) return false;
      if (costFilter === 'paid' && isFree(r)) return false;
      if (saFilter === 'yes' && !r.has_south_asian) return false;
      if (priceFilter !== 'all') {
        if (r.category !== 'submithub') return false;
        if ((r.price_credits || 0) > parseInt(priceFilter)) return false;
      }
      if (!matchesSearch(r, searchVal)) return false;
      return true;
    });
  }

  // Badge label
  function catBadge(r) {
    const cc = cardCat(r);
    const labels = {
      'editorial': ['Editorial', 'badge-editorial'],
      'podcast': ['Podcast', 'badge-podcast'],
      'submithub-blog': ['SH Blog', 'badge-submithub-blog'],
      'submithub-spotify': ['SH Spotify', 'badge-submithub-spotify'],
      'submithub-youtube': ['SH YouTube', 'badge-submithub-youtube'],
      'submithub-radio': ['SH Radio', 'badge-submithub-radio'],
    };
    const [lbl, cls] = labels[cc] || [cc, ''];
    return `<span class="badge ${cls}">${lbl}</span>`;
  }

  function costBadge(r) {
    if (r.category !== 'submithub') {
      return `<span class="badge badge-free">Free</span>`;
    }
    const cr = r.price_credits || 0;
    if (cr === 0) return `<span class="badge badge-free">Free tier</span>`;
    return `<span class="badge badge-paid">${cr} cr (~$${cr})</span>`;
  }

  function reachStr(r) {
    const reach = r.reach || {};
    if (r.category === 'editorial') {
      return reach.monthly_visitors
        ? `<strong>${fmtN(reach.monthly_visitors)}</strong> monthly visitors`
        : '';
    }
    if (r.category === 'podcast') {
      return reach.subscribers
        ? `<strong>${fmtN(reach.subscribers)}</strong> subscribers`
        : '';
    }
    if (r.category === 'submithub') {
      const parts = [];
      if (reach.reach_rank != null) parts.push(`reach score <strong>${reach.reach_rank}</strong>/100`);
      if (reach.youtube_avg) parts.push(`avg <strong>${fmtN(reach.youtube_avg)}</strong> YT views`);
      if (reach.spotify_playlists) parts.push(`<strong>${reach.spotify_playlists}</strong> Spotify playlists`);
      if (reach.quality_rank != null && !parts.length) parts.push(`quality score <strong>${reach.quality_rank}</strong>/100`);
      return parts.join(' · ');
    }
    return '';
  }

  function fmtN(n) {
    if (!n) return '0';
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(0) + 'K';
    return n.toString();
  }

  function submitActions(r) {
    if (r.category === 'submithub') {
      const cr = r.price_credits || 0;
      const url = r.submithub_url || r.url || '#';
      const crLabel = cr === 0 ? 'Submit free (standard queue)' : `Submit on SubmitHub · ${cr} credit${cr>1?'s':''} ≈ $${cr}`;
      return `<a class="submit-btn ${cr === 0 ? 'submit-btn-web' : 'submit-btn-paid'}" href="${url}" target="_blank">
        ${cr === 0 ? '⊕' : '◈'} ${crLabel}
      </a>`;
    }

    if (!r.pitch_to || r.pitch_to.length === 0) {
      if (r.url) return `<a class="submit-btn submit-btn-web" href="${r.url}" target="_blank">⊕ Submit via website</a>`;
      return `<span style="color:var(--muted);font-size:12px;">No submission info found</span>`;
    }

    return r.pitch_to.map(p => {
      const contact = p.contact || '';
      const label = p.label || 'Submit';
      if (contact.includes('@')) {
        return `<a class="submit-btn submit-btn-email" href="mailto:${contact}" target="_blank">✉ ${label}: ${contact}</a>`;
      }
      return `<a class="submit-btn submit-btn-web" href="${contact}" target="_blank">⊕ ${label}</a>`;
    }).join('');
  }

  function renderCard(r) {
    const genres = (r.genres || []).slice(0, 5).map(g =>
      `<span class="genre-tag">${g}</span>`
    ).join('');
    const langs = (r.languages || []).join(', ');
    const reach = reachStr(r);
    const saTag = r.has_south_asian ? `<span class="badge badge-south-asian">South Asian</span>` : '';
    const nameLink = r.url
      ? `<a href="${r.url}" target="_blank">${r.name}</a>`
      : r.name;

    return `<div class="card">
      <div class="card-top">
        <div class="card-name">${nameLink}</div>
        <div class="card-badges">
          ${catBadge(r)}
          ${costBadge(r)}
          ${saTag}
        </div>
      </div>
      ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
      <div class="card-meta">
        ${langs ? `<span class="meta-tag">${langs}</span>` : ''}
        ${r.country ? `<span class="meta-tag">${r.country}</span>` : ''}
        ${reach ? `<span class="reach">${reach}</span>` : ''}
      </div>
      ${genres ? `<div class="genres">${genres}</div>` : ''}
      <div class="card-submit">
        <div class="submit-label">How to submit</div>
        <div class="submit-actions">${submitActions(r)}</div>
      </div>
    </div>`;
  }

  function renderStats(filtered) {
    const free = filtered.filter(r => isFree(r)).length;
    const paid = filtered.filter(r => !isFree(r)).length;
    const sa = filtered.filter(r => r.has_south_asian).length;
    const cats = {};
    filtered.forEach(r => {
      const cc = cardCat(r);
      cats[cc] = (cats[cc] || 0) + 1;
    });

    const catLabels = {
      'editorial': 'Editorial', 'podcast': 'Podcast',
      'submithub-blog': 'SH Blog', 'submithub-spotify': 'SH Spotify',
      'submithub-youtube': 'SH YouTube', 'submithub-radio': 'SH Radio',
    };

    const catChips = Object.entries(cats).map(([k, v]) =>
      `<div class="stat-chip"><span class="num">${v}</span><span class="lbl">${catLabels[k]||k}</span></div>`
    ).join('');

    document.getElementById('stats-bar').innerHTML =
      `<div class="stat-chip"><span class="num" style="color:var(--accent2)">${free}</span><span class="lbl">Free to submit</span></div>` +
      `<div class="stat-chip"><span class="num" style="color:var(--accent3)">${paid}</span><span class="lbl">Paid (credits)</span></div>` +
      (sa ? `<div class="stat-chip"><span class="num" style="color:#fb923c">${sa}</span><span class="lbl">South Asian tagged</span></div>` : '') +
      catChips;
  }

  function render() {
    const filtered = applyFilters();
    document.getElementById('visible-count').textContent = `${filtered.length} reviewers`;
    renderStats(filtered);

    const grid = document.getElementById('grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty">No reviewers match your filters. Try broadening your search.</div>`;
      return;
    }
    grid.innerHTML = filtered.map(renderCard).join('');
  }

  // Filter pill listeners
  function setupPillGroup(groupId, setter, activeClass = 'active') {
    document.getElementById(groupId).addEventListener('click', e => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      document.querySelectorAll(`#${groupId} .pill`).forEach(p => p.className = 'pill');
      btn.classList.add(activeClass);
      setter(btn.dataset.val);
      render();
    });
  }

  setupPillGroup('filter-cat', v => catFilter = v);
  setupPillGroup('filter-cost', v => costFilter = v);
  setupPillGroup('filter-sa', v => saFilter = v);
  setupPillGroup('filter-price', v => priceFilter = v);

  document.getElementById('search').addEventListener('input', e => {
    searchVal = e.target.value.trim();
    render();
  });

  render();
})();
</script>
</body>
</html>
