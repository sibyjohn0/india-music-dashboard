<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Indie Music Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">◉ India Indie Music Radar</div>
    <div class="header-right">
      <span id="last-updated" class="muted"></span>
      <span id="total-badge" class="badge"></span>
    </div>
  </header>

  <nav>
    <button class="tab active" data-tab="discover">Discover</button>
    <button class="tab" data-tab="artists">Artists</button>
    <button class="tab" data-tab="browse">Browse</button>
    <button class="tab" data-tab="trends">Trends</button>
  </nav>

  <main>

    <!-- ── DISCOVER ── -->
    <div id="tab-discover" class="tab-pane active">

      <div class="discover-hero">
        <div class="discover-hero-label">Today's Top Finds</div>
        <div class="hero-cards" id="hero-cards"></div>
      </div>

      <div class="discover-body">
        <div class="pulse-row" id="pulse-list"></div>

        <div class="breakdown-col">
          <div class="breakdown-box">
            <div class="breakdown-title">By Genre</div>
            <div id="genre-bars"></div>
          </div>
          <div class="breakdown-box">
            <div class="breakdown-title">By Language</div>
            <div id="lang-bars"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- ── ARTISTS ── -->
    <div id="tab-artists" class="tab-pane">
      <div class="filter-bar">
        <input type="text" id="a-search" placeholder="Search artist…" />
        <select id="a-genre"><option value="all">All Genres</option></select>
        <select id="a-lang"><option value="all">All Languages</option></select>
        <select id="a-sort">
          <option value="avg_discovery">Discovery Score</option>
          <option value="avg_engagement">Engagement</option>
          <option value="avg_velocity">Velocity</option>
          <option value="total_views">Total Views</option>
        </select>
      </div>
      <div class="artist-grid" id="artist-grid"></div>
    </div>

    <!-- ── BROWSE ── -->
    <div id="tab-browse" class="tab-pane">
      <div class="filter-bar">
        <input type="text" id="v-search" placeholder="Search title or artist…" />
        <select id="v-sort">
          <option value="discovery_score">Discovery Score</option>
          <option value="engagement_rate">Engagement</option>
          <option value="velocity">Velocity</option>
          <option value="published_at">Newest</option>
          <option value="views">Views</option>
        </select>
        <select id="v-genre"><option value="all">All Genres</option></select>
        <select id="v-lang"><option value="all">All Languages</option></select>
      </div>
      <div class="video-list" id="video-list"></div>
    </div>

    <!-- ── TRENDS ── -->
    <div id="tab-trends" class="tab-pane">
      <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
      <div class="trends-empty" id="trends-loading">Loading monthly data…</div>
      <div class="trends-grid" id="trends-grid" style="display:none">
        <div class="chart-card">
          <div class="chart-card-title">Genre — videos per month</div>
          <canvas id="trend-genre"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Language — videos per month</div>
          <canvas id="trend-lang"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Total views per month</div>
          <canvas id="trend-views"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Videos tracked per month</div>
          <canvas id="trend-count"></canvas>
        </div>
      </div>
      <div id="trends-table-wrap" style="display:none">
        <table class="data-table">
          <thead><tr><th>Month</th><th>Videos</th><th>Total Views</th><th>Top Genre</th><th>Top Language</th><th>Top Artist</th></tr></thead>
          <tbody id="trends-body"></tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
