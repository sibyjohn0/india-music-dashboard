<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Music Trending</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo"><span class="logo-icon">▶</span> India Music Trending</div>
      <div class="meta">
        <span id="last-updated">—</span>
        <span class="badge" id="total-badge">—</span>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="channels">Channels</button>
      <button class="tab" data-tab="videos">All Videos</button>
    </div>
  </header>

  <main>

    <!-- ── OVERVIEW TAB ── -->
    <div id="tab-overview" class="tab-content active">
      <section class="stats-row" id="stats-row"></section>

      <section class="section">
        <h2 class="section-title">Top Trending</h2>
        <div class="top-cards" id="top-cards"></div>
      </section>

      <section class="section two-col">
        <div class="chart-box">
          <h2 class="section-title">Views — Top 15</h2>
          <canvas id="views-chart" height="260"></canvas>
        </div>
        <div class="chart-box">
          <h2 class="section-title">View Velocity — Top 15 <span class="hint">(views/day)</span></h2>
          <canvas id="velocity-chart" height="260"></canvas>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Top Keywords & Tags</h2>
        <div class="tag-cloud" id="tag-cloud"></div>
      </section>
    </div>

    <!-- ── CHANNELS TAB ── -->
    <div id="tab-channels" class="tab-content">
      <div class="table-header">
        <h2 class="section-title">Artists & Channels</h2>
        <div class="controls">
          <input type="text" id="ch-search" placeholder="Search channel…" />
          <select id="ch-sort">
            <option value="total_views">Sort: Total Views</option>
            <option value="avg_velocity">Sort: Avg Velocity</option>
            <option value="total_earnings">Sort: Est. Earnings</option>
            <option value="avg_engagement">Sort: Engagement</option>
            <option value="video_count">Sort: Videos Tracked</option>
          </select>
          <select id="ch-filter">
            <option value="all">All Artists</option>
            <option value="indie">Indie / Independent</option>
            <option value="mainstream">Mainstream</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table id="channel-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Channel / Artist</th>
              <th>Videos</th>
              <th>Total Views</th>
              <th>Avg Velocity</th>
              <th>Est. Earnings</th>
              <th>Avg Engagement</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody id="channel-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ── VIDEOS TAB ── -->
    <div id="tab-videos" class="tab-content">
      <div class="table-header">
        <h2 class="section-title">All Videos</h2>
        <div class="controls">
          <input type="text" id="search" placeholder="Search title / channel…" />
          <select id="sort-by">
            <option value="views">Sort: Views</option>
            <option value="velocity">Sort: Velocity</option>
            <option value="views_delta">Sort: 24h Growth</option>
            <option value="engagement_rate">Sort: Engagement</option>
            <option value="earnings_est_inr">Sort: Est. Earnings</option>
            <option value="published_at">Sort: Newest</option>
          </select>
          <select id="filter-category">
            <option value="all">All Artists</option>
            <option value="indie">Indie / Independent</option>
            <option value="mainstream">Mainstream</option>
          </select>
          <select id="filter-source">
            <option value="all">All Sources</option>
            <option value="trending_chart">Trending Chart</option>
            <option value="keyword_search">Keyword Search</option>
            <option value="indie_search">Indie Search</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table id="video-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Video</th>
              <th>Uploaded</th>
              <th>Views</th>
              <th>24h Δ</th>
              <th>Velocity</th>
              <th>Est. ₹</th>
              <th>Engagement</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </main>
  <script src="app.js"></script>
</body>
</html>
