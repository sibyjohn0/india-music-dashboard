<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Music Trending</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">▶</span>
        <span>India Music Trending</span>
      </div>
      <div class="meta">
        <span id="last-updated">—</span>
        <span class="badge" id="total-badge">—</span>
      </div>
    </div>
  </header>

  <main>
    <!-- Stats row -->
    <section class="stats-row" id="stats-row"></section>

    <!-- Top 3 cards -->
    <section class="section">
      <h2 class="section-title">Top Trending</h2>
      <div class="top-cards" id="top-cards"></div>
    </section>

    <!-- Views chart -->
    <section class="section two-col">
      <div class="chart-box">
        <h2 class="section-title">Views — Top 15</h2>
        <canvas id="views-chart" height="260"></canvas>
      </div>
      <div class="chart-box">
        <h2 class="section-title">Engagement Rate — Top 15</h2>
        <canvas id="eng-chart" height="260"></canvas>
      </div>
    </section>

    <!-- Keyword cloud -->
    <section class="section">
      <h2 class="section-title">Top Keywords & Tags</h2>
      <div class="tag-cloud" id="tag-cloud"></div>
    </section>

    <!-- Full table -->
    <section class="section">
      <div class="table-header">
        <h2 class="section-title">All Videos</h2>
        <div class="controls">
          <input type="text" id="search" placeholder="Search title / channel…" />
          <select id="sort-by">
            <option value="views">Sort: Views</option>
            <option value="engagement_rate">Sort: Engagement</option>
            <option value="published_at">Sort: Newest</option>
            <option value="likes">Sort: Likes</option>
          </select>
          <select id="filter-category">
            <option value="all">All Artists</option>
            <option value="indie">Indie / Independent</option>
            <option value="mainstream">Mainstream</option>
          </select>
          <select id="filter-source">
            <option value="all">All Sources</option>
            <option value="trending_chart">Trending Chart</option>
            <option value="keyword_search">Keyword Search</option>
            <option value="indie_search">Indie Search</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table id="video-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Video</th>
              <th>Uploaded</th>
              <th>Views</th>
              <th>Likes</th>
              <th>Comments</th>
              <th>Engagement</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
