name: Daily Pipeline

on:
  schedule:
    - cron: "0 1 * * *"    # 01:00 UTC daily (6:30 AM IST)
  workflow_dispatch:        # allow manual trigger
    inputs:
      reviewers:
        description: "Also run reviewer refresh (normally weekly-only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run unified pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          # On Sundays (UTC day 0) include reviewer refresh; manual trigger honours input
          FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; then
            FLAGS="--reviewers"
          elif [ "${{ github.event.inputs.reviewers }}" = "true" ]; then
            FLAGS="--reviewers"
          fi
          echo "Pipeline flags: ${FLAGS}"
          python scripts/pipeline.py $FLAGS

      - name: Commit all data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily pipeline $(date -u '+%Y-%m-%d')"
          git push

      - name: Read pipeline status
        id: pipeline_status
        run: |
          python -c "
          import json, os, sys

          with open('data/pipeline-status.json') as f:
              d = json.load(f)

          overall = d.get('overall', 'ok')
          sources = d.get('sources', {})

          failed = {
              k: v for k, v in sources.items()
              if isinstance(v, dict) and v.get('status') not in ('ok', 'success', None)
          }
          lines = []
          for src, info in failed.items():
              err = info.get('error') or info.get('message') or info.get('status') or 'unknown error'
              lines.append(f'  {src}: {err}')

          body = 'Failed sources:\n' + ('\n'.join(lines) if lines else '  (no detail available)')
          label = overall.upper()
          run_date = __import__('datetime').datetime.utcnow().strftime('%Y-%m-%d')
          subject = f'India Music Radar -- Pipeline [{label}] {run_date}'

          gh_output = os.environ.get('GITHUB_OUTPUT', '/dev/stdout')
          with open(gh_output, 'a') as out:
              out.write(f'overall={overall}\n')
              out.write(f'subject={subject}\n')
              out.write('body<<BODYEOF\n')
              out.write(body + '\n')
              out.write('BODYEOF\n')
          "

      - name: Send alert email on pipeline failure
        if: steps.pipeline_status.outputs.overall == 'partial' || steps.pipeline_status.outputs.overall == 'failed'
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: sibyjohn0@gmail.com
          from: ${{ secrets.GMAIL_USERNAME }}
          subject: ${{ steps.pipeline_status.outputs.subject }}
          body: |
            ${{ steps.pipeline_status.outputs.body }}

            View the full run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
