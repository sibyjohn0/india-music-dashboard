name: Refresh Reviewer Database

on:
  schedule:
    # Weekly Sunday 6 AM UTC — after YouTube quota resets at midnight PT (~7-8 AM UTC)
    # Runs before the main daily fetch (9 AM UTC) to get first use of fresh quota.
    - cron: "0 6 * * 0"
  workflow_dispatch:   # allow manual trigger any time

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch editorial blogs (DuckDuckGo, no credentials)
        run: python scripts/fetch_reviewers_editorial.py

      - name: Fetch podcasts (iTunes API, no credentials)
        run: python scripts/fetch_reviewers_podcasts.py

      - name: Fetch Spotify curators
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python scripts/fetch_reviewers_spotify.py

      - name: Fetch YouTube reviewer channels
        # Uses ~8,000 of 10,000 daily YouTube quota units.
        # Scheduled at 6 AM UTC (after midnight PT reset) before the main daily
        # fetch at 9 AM UTC, so both get a share of the fresh quota.
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_reviewers_youtube.py

      - name: Merge all categories into reviewers.json
        # SubmitHub data is not re-fetched here (requires browser automation).
        # The existing data/reviewers/submithub.json is included in the merge
        # as-is and should be refreshed manually every few months.
        run: python scripts/merge_reviewers.py

      - name: Commit updated reviewer data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviewers/
          git add data/reviewers.json
          git diff --cached --quiet || git commit -m "data: weekly reviewer refresh $(date -u '+%Y-%m-%d')"
          git push
        if: success()
