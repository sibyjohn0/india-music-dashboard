name: Fetch YouTube India Music

on:
  schedule:
    - cron: "30 1 * * *"   # 7:00 AM IST daily
  workflow_dispatch:        # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube.py

      - name: Enrich with Last.fm
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python scripts/enrich_lastfm.py

      - name: Generate language insights
        run: python scripts/generate_insights.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily refresh $(date -u '+%Y-%m-%d')"
          git push
        if: success()
