name: Fetch YouTube India Music

on:
  schedule:
    - cron: "0 9 * * *"    # 2:30 PM IST daily (after YouTube quota reset at ~7 AM UTC)
  workflow_dispatch:        # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube.py

      - name: Enrich with Last.fm
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python scripts/enrich_lastfm.py

      - name: Build artist radar
        run: python scripts/build_radar.py

      - name: Generate language insights
        run: python scripts/generate_insights.py

      - name: Enrich with Spotify
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python scripts/fetch_spotify.py

      - name: Fetch social conversations
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python scripts/fetch_social.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily refresh $(date -u '+%Y-%m-%d')"
          git push
        if: success()
