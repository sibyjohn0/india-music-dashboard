<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Indie Music Radar</title>
  <script>
    (function () {
      var base = "https://indiemusicindia.com";
      var path = window.location.pathname.replace(/\/india-music-dashboard/, "").replace(/\.html$/, "");
      var hash = window.location.hash || "";
      var search = window.location.search || "";

      // Path-based smart redirects
      var routes = {
        "/playbook":         base + "/playbook/" + hash,
        "/reviewers":        base + "/reviewers/" + hash,
        "/about":            base + "/about/" + hash,
        "/programme":        base + "/programme/" + hash,
        "/submit":           base + "/submit/" + hash,
        "/deep-dive":        base + "/deep-dive/" + hash,
        "/status":           base + "/status/" + hash,
      };

      var target = routes[path] || (base + "/about/" + search);
      window.location.replace(target);
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=https://indiemusicindia.com/about/" />
  <style>
    body { background: #0d0d0f; color: #aaa; font-family: Inter, sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; font-size: 14px; }
  </style>
</head>
<body>Redirecting…</body>
</html>
